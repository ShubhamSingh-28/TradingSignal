spring:
  application:
    name: tradingsignal
  datasource:
    url: jdbc:postgresql://localhost:5432/trading_signal_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # fine for this assignment; mention Flyway as bonus in README
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

binance:
  api:
    base-url: https://api.binance.com

springdoc:
  swagger-ui:
    path: /swagger-ui.html
